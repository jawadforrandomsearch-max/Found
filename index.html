    <title>Sadiqon StepFund</title>
    <script>
      // Safe fetch patch to prevent "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // in sandboxed iframe environments or browser extension wrappers (like Google Translate).
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() {
              return currentFetch;
            },
            set(value) {
              currentFetch = value;
            }
          });
        }
      } catch (e) {
        console.warn('Safe fetch patch registration failed:', e);
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
